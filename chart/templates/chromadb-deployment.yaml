apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-chromadb
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vector-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chromadb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromadb
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: vector-store
    spec:
      containers:
        - name: chromadb
          image: {{ .Values.chromadb.image }}
          ports:
            - containerPort: 8000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-chromadb
