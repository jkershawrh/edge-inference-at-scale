apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-chromadb
  labels:
    app.kubernetes.io/name: chromadb
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: vector-store
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.chromadb.storageSize }}
