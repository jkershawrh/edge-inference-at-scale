name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax check
        run: |
          python -c "
          import ast, os, sys
          errors = 0
          for root, dirs, files in os.walk('backend'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          print(f'FAIL: {path}: {e}')
                          errors += 1
          print(f'{\"PASS\" if not errors else \"FAIL\"}: {errors} errors')
          sys.exit(errors)
          "
      - name: Helm lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint chart/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
      - name: Run contract tests
        run: python -m pytest tests/contracts/ -v --tb=short
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short || true

  container:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t edge-backend:test backend/
      - name: Verify image
        run: docker run --rm edge-backend:test python3.11 -c "from backend.shared.config import settings; print(f'node_id={settings.node_id}')"
