# Edge Inference at Scale — Micronode Profile
# Simulates an 8-core / 16 GB edge board (Orange Pi 5 Plus, Rock 5B class)
# SMS → BitNet LLM → SMS with RAG, resource-constrained for edge deployment
# Total budget: 8 CPU / 16 GB RAM

services:

  # --- Infrastructure ---

  bitnet-server:
    image: localhost/bitnet-cpp:latest
    command: ["--model", "/models/ggml-model-i2_s.gguf",
              "--host", "0.0.0.0", "--port", "8080",
              "--ctx-size", "512", "--threads", "8",
              "-np", "2", "--alias", "bitnet-2b4t"]
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8080) 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - edge-network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma-data:/chroma
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8000) 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edge-network

  # --- Backend Services ---

  api-gateway:
    build:
      context: ./backend
      dockerfile: Containerfile
    command: ["python3.11", "-m", "uvicorn", "backend.api_gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - NODE_ID=edge-node-001
      - SMS_MODE=sim
      - SMS_GATEWAY_URL=http://sms-gateway:8001
      - MESSAGE_ROUTER_URL=http://message-router:8002
      - LLM_INFERENCE_URL=http://llm-inference:8003
      - RAG_SERVICE_URL=http://rag-service:8004
      - PRIVACY_FILTER_URL=http://privacy-filter:8005
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    depends_on:
      sms-gateway:
        condition: service_healthy
      message-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8000/health').status_code)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

  sms-gateway:
    build:
      context: ./backend
      dockerfile: Containerfile
    command: ["python3.11", "-m", "uvicorn", "backend.services.sms_gateway.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      - SMS_MODE=sim
      - MESSAGE_ROUTER_URL=http://message-router:8002
      - REDIS_URL=redis://redis:6379/0
      - LLM_REQUEST_TIMEOUT_SECONDS=60
      - SMS_ROUTER_TIMEOUT_SECONDS=60
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8001/health').status_code)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

  message-router:
    build:
      context: ./backend
      dockerfile: Containerfile
    command: ["python3.11", "-m", "uvicorn", "backend.services.message_router.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      - LLM_SERVICE_URL=http://llm-inference:8003
      - RAG_SERVICE_URL=http://rag-service:8004
      - PRIVACY_FILTER_URL=http://privacy-filter:8005
      - SMS_GATEWAY_URL=http://sms-gateway:8001
      - LLM_REQUEST_TIMEOUT_SECONDS=60
      - RAG_DIRECT_THRESHOLD=0.8
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    depends_on:
      llm-inference:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8002/health').status_code)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

  llm-inference:
    build:
      context: ./backend
      dockerfile: Containerfile
    command: ["python3.11", "-m", "uvicorn", "backend.services.llm_inference.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      - BITNET_SERVER_URL=http://bitnet-server:8080
      - MODEL_NAME=bitnet-2b4t
      - LLM_REQUEST_TIMEOUT_SECONDS=60
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    depends_on:
      bitnet-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8003/health').status_code)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

  rag-service:
    build:
      context: ./backend
      dockerfile: Containerfile.rag
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - SUMMIT_DATA_DIR=/data/summit_connect
      - HOME=/tmp
    volumes:
      - rag-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2g
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8004/health').status_code)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edge-network

  privacy-filter:
    build:
      context: ./backend
      dockerfile: Containerfile
    command: ["python3.11", "-m", "uvicorn", "backend.services.privacy_filter.main:app", "--host", "0.0.0.0", "--port", "8005"]
    environment:
      - HOME=/tmp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import httpx; print(httpx.get('http://localhost:8005/health').status_code)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edge-network

networks:
  edge-network:
    driver: bridge

volumes:
  chroma-data:
  rag-data:
