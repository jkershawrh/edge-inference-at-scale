# Evaluation Queries — EDD Response Quality Framework
# Ground-truth test queries for the SMS -> RAG -> LLM -> SMS pipeline.
# Each query defines expected keywords, entities, and forbidden patterns
# to score responses against without ML-based evaluation.
#
# Source data: data/summit_connect/{sessions,speakers,venues,schedule,city_guide}.json

eval_queries:

  # ---------------------------------------------------------------------------
  # Schedule queries
  # ---------------------------------------------------------------------------

  - id: sched_01
    query: "What time is the keynote?"
    category: schedule
    expected_keywords: ["9:00", "keynote", "Main Hall"]
    forbidden_keywords: ["unfortunately", "I don't know", "I cannot"]
    expected_entities:
      - "9:00"
      - "Main Hall"
      - "Day 1"
    max_acceptable_latency_ms: 15000

  - id: sched_02
    query: "What's happening on Day 2?"
    category: schedule
    expected_keywords: ["breakout", "session"]
    forbidden_keywords: ["unfortunately", "I don't know"]
    expected_entities:
      - "breakout"
      - "Day 2"
    max_acceptable_latency_ms: 15000

  - id: sched_03
    query: "When is the conference dinner?"
    category: schedule
    expected_keywords: ["dinner", "19:00"]
    forbidden_keywords: ["I don't know", "I cannot"]
    expected_entities:
      - "19:00"
      - "Grand Ballroom"
      - "Day 2"
    max_acceptable_latency_ms: 15000

  - id: sched_04
    query: "What time does registration open?"
    category: schedule
    expected_keywords: ["registration", "7:00"]
    forbidden_keywords: ["I don't know", "I cannot"]
    expected_entities:
      - "7:00"
      - "North Lobby"
    max_acceptable_latency_ms: 15000

  - id: sched_05
    query: "Are there workshops?"
    category: schedule
    expected_keywords: ["workshop"]
    forbidden_keywords: ["I don't know", "no workshops"]
    expected_entities:
      - "Day 1"
      - "A1"
    max_acceptable_latency_ms: 15000

  - id: sched_06
    query: "What happens on the last day?"
    category: schedule
    expected_keywords: ["lab", "closing"]
    forbidden_keywords: ["I don't know"]
    expected_entities:
      - "Day 3"
      - "Hands-On"
    max_acceptable_latency_ms: 15000

