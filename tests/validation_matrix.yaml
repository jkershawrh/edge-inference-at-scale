# Validation Matrix — CDD -> TDD -> EDD -> BDD -> CBT -> Publication
# Write tests RED, deploy until GREEN. Each stage gates the next.
# Edge Inference at Scale: SMS -> LLM -> SMS pipeline at the edge.

stages:

  stage_0_contracts:
    name: "CDD - Contract-Driven Development"
    description: "All API contracts defined and parseable"
    threshold: 100
    gate: null  # First stage — no prerequisite
    criteria:
      openapi_spec_valid:
        description: "OpenAPI spec validates against 3.1"
        points: 25
        required: true
      openapi_has_paths:
        description: "Spec defines at least one path with operations"
        points: 25
        required: true
      openapi_refs_resolve:
        description: "All $ref pointers resolve within the spec"
        points: 25
        required: true
      openapi_responses_defined:
        description: "Every operation has at least one response schema"
        points: 25
        required: true

  stage_1_unit:
    name: "TDD - Test-Driven Development"
    description: "Unit tests pass with mocked services — SMS gateway, message router, LLM inference, RAG service"
    threshold: 90
    gate: stage_0_contracts
    criteria:
      sim_driver_send_receive:
        description: "SimDriver send_sms and receive_sms store messages correctly"
        points: 15
        required: true
      sim_driver_inbox_outbox:
        description: "SimDriver get_inbox / get_outbox return correct history"
        points: 10
        required: true
      rate_limiter:
        description: "Rate limiter blocks after per-minute threshold"
        points: 10
        required: true
      message_receive_and_forward:
        description: "Gateway receive_message queues envelope for forwarding"
        points: 10
        required: true
      message_parser_intent_detection:
        description: "MessageParser detects emergency, question, greeting, command intents"
        points: 10
        required: true
      inference_request:
        description: "LLM inference endpoint returns well-formed LLMResponse"
        points: 10
        required: true
      response_truncation_160:
        description: "LLM responses are truncated to 160 characters for SMS"
        points: 10
        required: true
      bitnet_unavailable_502:
        description: "LLM inference returns 502 when BitNet server unreachable"
        points: 5
        required: true
      stats_tracking:
        description: "Stats counters increment correctly on success/failure"
        points: 5
        required: true
      system_prompt_included:
        description: "System prompt is included in chat completion request"
        points: 5
        required: true
      classify_emergency:
        description: "Router classifies emergency keywords as MessageType.EMERGENCY"
        points: 5
        required: true
      classify_command:
        description: "Router classifies /command messages as MessageType.COMMAND"
        points: 5
        required: true

  stage_2_integration:
    name: "Integration Tests"
    description: "End-to-end flow tests — SMS receive -> route -> RAG -> LLM -> response"
    threshold: 85
    gate: stage_1_unit
    criteria:
      full_sms_pipeline:
        description: "SMS receive -> router -> RAG -> LLM -> SMS response completes"
        points: 25
        required: true
      emergency_bypass:
        description: "Emergency messages skip RAG/LLM and return canned response"
        points: 15
        required: true
      greeting_template:
        description: "Simple greetings return Summit Connect welcome without LLM call"
        points: 10
        required: true
      rag_context_forwarded:
        description: "RAG context is included in the LLM inference request"
        points: 15
        required: true
      sms_chunking:
        description: "Long responses are chunked into 160-char SMS segments"
        points: 10
        required: true
      error_fallback:
        description: "LLM failure produces user-friendly fallback message"
        points: 10
        required: true
      health_endpoints:
        description: "All service /health endpoints return valid ServiceHealth"
        points: 15
        required: true

  stage_3_benchmarks:
    name: "EDD - Experiment-Driven Development"
    description: "Benchmark rubric — inference latency, RAG retrieval quality, message throughput"
    threshold: 80
    gate: stage_2_integration
    criteria: {}
    # Governed by tests/benchmark_rubric.yaml and tests/claim_registry.yaml.
    # Benchmarks run against live compose stack.

  stage_4_bdd:
    name: "BDD - Behavior-Driven Development"
    description: "User scenarios — send SMS, get response, emergency handling, rate limiting"
    threshold: 85
    gate: stage_3_benchmarks
    criteria:
      scenario_send_question_get_answer:
        description: "User sends 'What sessions are about edge computing?' and receives a relevant response"
        points: 20
        required: true
      scenario_emergency_message:
        description: "User sends 'help fire emergency' and gets immediate security guidance"
        points: 20
        required: true
      scenario_rate_limiting:
        description: "User sending > max_sms_per_minute receives 429 Too Many Requests"
        points: 15
        required: true
      scenario_greeting_flow:
        description: "User sends 'hello' and receives Summit Connect welcome message"
        points: 15
        required: true
      scenario_long_response_chunked:
        description: "Response exceeding 160 chars arrives as multi-part SMS"
        points: 15
        required: true
      scenario_command_help:
        description: "User sends '/help' and receives command listing"
        points: 15
        required: true

  stage_5_publication:
    name: "CBT + Publication"
    description: "README quality, architecture diagram, claim verification — zero BLOCKERs"
    threshold: 100
    gate: stage_4_bdd
    criteria:
      title_format:
        description: "H1 title <= 64 chars, starts with action verb"
        points: 10
        required: true
      short_description:
        description: "Short description <= 160 chars"
        points: 10
        required: true
      required_sections:
        description: "All required README sections present in correct order"
        points: 15
        required: true
      architecture_diagram:
        description: "Architecture diagram in docs/images/ with alt text"
        points: 10
        required: true
      no_credentials:
        description: "No hardcoded credentials in repo"
        points: 15
        required: true
      links_resolve:
        description: "All links (internal + external) resolve"
        points: 10
        required: true
      industry_tag:
        description: "Industry tag from approved list"
        points: 10
        required: true
      tag_format:
        description: "Tags as bulleted list with bold key and normal value"
        points: 5
        required: true
      opl_compliance:
        description: "Red Hat trademark first-mention-only rule"
        points: 10
        required: true
      accessibility:
        description: "WCAG 2.2 AA: heading nesting, alt text, descriptive links"
        points: 5
        required: true
